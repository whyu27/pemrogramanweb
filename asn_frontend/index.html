<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Whyu Id | Tanaman Hias</title>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="nav-logo">
            <span class="logo-name">Whyu<span class="logo-accent">Plant</span></span>
        </div>
        <ul>
            <li><a href="#search">Home</a></li>
            <li><a href="#cars">Plants</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#faq">FAQ</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <div id="search">
        <div class="title">
            <h1>Temukan Kedamaian di Setiap Helai Daun</h1>
            <p>Tanaman hias minimalis yang mudah dirawat untuk jiwa yang sibuk</p>
            <hr>
        </div>

        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Lokasi Toko:</label>
                <select id="pickup" name="pickup">
                    <option value="">Pilih Lokasi</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>

            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>

            <button type="submit">Search</button>
        </div>
    </div>
</body>
</html>
