<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="/submit" method="post">
        <label for="nama">Nama : </label>
        <input type="text" id="nama" name="nama" placeholder="Masukkan Nama" required> <br><br>

        <label for="email">Email : </label>
        <input type="email" id="email" name="email" placeholder="Masukkan Email" required> <br><br>

        <label for="message">Message : </label><br>
        <textarea id="message" name="message" rows="4" cols="50" placeholder="Masukkan Message" required></textarea> <br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
