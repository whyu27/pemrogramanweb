<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="nav-logo">
            <span>WhyuSport</span>
        </div>
        <ul>
            <li><a href="#search">Home</a></li>
            <li><a href="">Cars</a></li>
            <li><a href="">About</a></li>
            <li><a href="">FAQ</a></li>
            <li><a href="">Contact</a></li>
        </ul>
    </nav>

    <div id="search">
        <div class="title">
            <h1>Car Rental</h1>
            <p>Find the perfect car for your next adventure</p>
            <hr>
        </div>

        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>

            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>

            <button type="submit">Search</button>
        </div>
    </div>

    <div class="car-list">
        <h2>Car List</h2>
        <div class="car-item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/McLaren_Senna_Genf_2018.jpg/1280px-McLaren_Senna_Genf_2018.jpg" alt="Car 1">
            <h3>MCLaren Senna</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="https://hips.hearstapps.com/hmg-prod/images/2024-lamborghini-revuelto-lightning-lap-2025-378-67ae462c26ed6.jpg?crop=0.559xw:0.476xh;0.199xw,0.377xh&resize=2048:*" alt="Car 2">
            <h3>BMW 3 Series Touring 330i M Sport</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="url" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="url" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
        </div>
    </div>
</body>

</html>
